<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A 股市场情绪 K 线图</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d0d0d;
      color: #fff;
      padding: 20px;
      min-height: 100vh;
    }
    
    .card {
      max-width: 900px;
      margin: 0 auto;
      background: #1a1a1a;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    
    .title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
      text-align: center;
      color: #fff;
    }
    
    .kline-area {
      background: #0f0f0f;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
      overflow-x: auto;
      overflow-y: hidden;
    }
    
    .canvas-wrapper {
      position: relative;
      min-width: 100%;
    }
    
    canvas {
      display: block;
      height: 400px;
      cursor: grab;
    }
    
    canvas:active {
      cursor: grabbing;
    }
    
    .zoom-hint {
      text-align: center;
      font-size: 12px;
      color: #666;
      margin-bottom: 12px;
    }
    
    .zoom-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }
    
    .zoom-btn {
      background: #333;
      border: none;
      color: #fff;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .zoom-btn:hover {
      background: #444;
    }
    
    .zoom-slider {
      width: 200px;
      height: 6px;
      -webkit-appearance: none;
      background: #333;
      border-radius: 3px;
      outline: none;
    }
    
    .zoom-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      background: #4acf8a;
      border-radius: 50%;
      cursor: pointer;
    }
    
    .zoom-level {
      font-size: 14px;
      color: #888;
      min-width: 50px;
      text-align: center;
    }
    
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    
    .stat-item {
      background: #1a1a1a;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }
    
    .stat-label {
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
    }
    
    .stat-value {
      font-size: 24px;
      font-weight: 600;
    }
    
    .stat-value.open { color: #9ca3af; }
    .stat-value.close { color: #9ca3af; }
    .stat-value.high { color: #4acf8a; }
    .stat-value.low { color: #ff4d4d; }
    
    .legend {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 16px;
      font-size: 12px;
      color: #888;
    }
    
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .legend-color {
      width: 16px;
      height: 3px;
      border-radius: 2px;
    }
    
    .legend-color.up { background: #ff4d4d; }
    .legend-color.down { background: #4acf8a; }
    .legend-color.overheat { background: #f44336; }
    .legend-color.ice { background: #03a9f4; }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">📊 A 股市场情绪 K 线图</div>
    
    <div class="zoom-controls">
      <button class="zoom-btn" id="zoomOut">−</button>
      <input type="range" class="zoom-slider" id="zoomSlider" min="0.2" max="0.8" step="0.05" value="1">
      <button class="zoom-btn" id="zoomIn">+</button>
      <span class="zoom-level" id="zoomLevel">100%</span>
    </div>
    <div class="zoom-hint">滚轮缩放 · 拖拽平移 · 双击重置</div>
    
    <div class="kline-area">
      <div class="canvas-wrapper">
        <canvas id="klineCanvas"></canvas>
      </div>
    </div>
    
    <div class="stats" id="stats">
      <div class="stat-item">
        <div class="stat-label">开盘</div>
        <div class="stat-value open" id="statOpen">-</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">收盘</div>
        <div class="stat-value close" id="statClose">-</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">最高</div>
        <div class="stat-value high" id="statHigh">-</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">最低</div>
        <div class="stat-value low" id="statLow">-</div>
      </div>
    </div>
    
    <div class="legend">
      <div class="legend-item">
        <div class="legend-color up"></div>
        <span>阳线 (红)</span>
      </div>
      <div class="legend-item">
        <div class="legend-color down"></div>
        <span>阴线 (绿)</span>
      </div>
      <div class="legend-item">
        <div class="legend-color overheat"></div>
        <span>过热 (&gt;=75)</span>
      </div>
      <div class="legend-item">
        <div class="legend-color ice"></div>
        <span>冰点 (&lt;25)</span>
      </div>
    </div>
  </div>

  <script>
    // 数据（动态加载）
    let DATA = [];

    // 配置
    const ML = 45;   // 左边距
    const MR = 25;   // 右边距
    const MT = 20;   // 上边距
    const MB = 45;   // 下边距
    const BASE_CANDLE_WIDTH = 40;    // 基础蜡烛宽度（像素）
    const BASE_CANDLE_SPACING = 60;  // 基础蜡烛间距（像素）
    const MIN_CHART_W = 400;         // 最小图表宽度
    
    // 缩放配置
    let zoomLevel = 1;           // 当前缩放级别
    const MIN_ZOOM = 0.3;        // 最小缩放（可深入缩出）
    const MAX_ZOOM = 0.8;        // 最大缩放（主要支持缩出）
    
    // 平移配置
    let panOffset = 0;           // 平移偏移量（像素）
    let isDragging = false;
    let dragStartX = 0;
    let panStartOffset = 0;
    
    // A 股配色
    const COLOR_UP = '#ff4d4d';      // 阳线红
    const COLOR_DOWN = '#4acf8a';    // 阴线绿
    const COLOR_GRID = '#333';
    const COLOR_TEXT = '#888';
    const COLOR_SHADOW_UP = 'rgba(255, 77, 77, 0.3)';
    const COLOR_SHADOW_DOWN = 'rgba(74, 207, 138, 0.3)';

    // 初始化
    const canvas = document.getElementById('klineCanvas');
    const ctx = canvas.getContext('2d');
    
    // 获取当前缩放后的蜡烛宽度和间距
    function getCandleMetrics() {
      return {
        width: BASE_CANDLE_WIDTH * zoomLevel,
        spacing: BASE_CANDLE_SPACING * zoomLevel
      };
    }
    
    // 设置 canvas 分辨率（动态宽度）
    function resizeCanvas() {
      const n = DATA.length || 1;
      const { spacing } = getCandleMetrics();
      // 根据 K 线数量和缩放计算所需宽度
      const requiredWidth = ML + MR + spacing * (n - 1) + BASE_CANDLE_WIDTH * zoomLevel + MIN_CHART_W * zoomLevel;
      const containerWidth = document.querySelector('.kline-area').clientWidth;
      const displayWidth = Math.max(requiredWidth, containerWidth);
      
      const dpr = window.devicePixelRatio || 1;
      canvas.width = displayWidth * dpr;
      canvas.height = 400 * dpr;
      ctx.scale(dpr, dpr);
      
      return { width: displayWidth, height: 400 };
    }
    
    // Y 轴映射：0 在底部，100 在顶部
    function toY(value, chartH) {
      return MT + chartH * (1 - value / 100);
    }
    
    // 绘制 K 线图
    function drawKline(size) {
      const { width, height } = size;
      const chartW = width - ML - MR;
      const chartH = height - MT - MB;
      
      // 清空画布
      ctx.clearRect(0, 0, width, height);
      
      // 1. 先画过热/冰点区域（最底层）- 冰点≤25，过热≥75
      const yOverheat = toY(75, chartH);  // 过热区从 75 开始
      const yIce = toY(25, chartH);
      
      ctx.fillStyle = 'rgba(244, 67, 54, 0.08)';  // 过热区红色
      ctx.fillRect(ML, MT, chartW, yOverheat - MT);
      
      ctx.fillStyle = 'rgba(3, 169, 244, 0.08)';  // 冰点区蓝色
      ctx.fillRect(ML, yIce, chartW, toY(0, chartH) - yIce);
      
      // 2. 画背景网格（在区域之上）- 延伸到整个图表宽度
      ctx.strokeStyle = COLOR_GRID;
      ctx.lineWidth = 1;
      
      // Y 轴刻度线 (0/5/10/15/.../100) - 集成到左侧，带颜色区分
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'right';
      
      for (let v = 0; v <= 100; v += 5) {
        const y = toY(v, chartH);
        const isMajor = v % 20 === 0;  // 主刻度（0/20/40/60/80/100）
        
        // 画网格线 - 延伸到整个图表右侧
        ctx.beginPath();
        ctx.moveTo(ML, y);
        ctx.lineTo(width - MR, y);
        ctx.strokeStyle = isMajor ? COLOR_GRID : '#222';
        ctx.lineWidth = isMajor ? 1 : 0.5;
        ctx.stroke();
        
        // 根据区间设置颜色（冰点≤25，过热≥75）
        let labelColor = COLOR_TEXT;  // 默认灰色
        if (v <= 25) {
          labelColor = '#03A9F4';  // 冰点区（≤25）- 蓝色
        } else if (v >= 75) {
          labelColor = '#F44336';  // 过热区（≥75）- 红色
        }
        
        // 绘制刻度数值（左侧）
        ctx.fillStyle = labelColor;
        ctx.fillText(v.toString(), ML - 8, y + 4);
      }
      
      // 画蜡烛 - 从左到右排列
      const n = DATA.length;
      const { width: CANDLE_WIDTH, spacing: CANDLE_SPACING } = getCandleMetrics();
      const startX = ML + CANDLE_WIDTH / 2 + panOffset;  // 起始 X 坐标（考虑平移）
      
      DATA.forEach((day, i) => {
        const cx = startX + CANDLE_SPACING * i;  // 按间距排列
        const isUp = day.close >= day.open;
        const color = isUp ? COLOR_UP : COLOR_DOWN;
        
        const yOpen = toY(day.open, chartH);
        const yClose = toY(day.close, chartH);
        const yHigh = toY(day.high, chartH);
        const yLow = toY(day.low, chartH);
        
        // 画影线（上影线 + 下影线）
        ctx.strokeStyle = color;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(cx, yHigh);
        ctx.lineTo(cx, yLow);
        ctx.stroke();
        
        // 画蜡烛体
        const bodyTop = Math.min(yOpen, yClose);
        const bodyBottom = Math.max(yOpen, yClose);
        const bodyH = Math.max(bodyBottom - bodyTop, 1);
        
        ctx.fillStyle = color;
        ctx.fillRect(cx - CANDLE_WIDTH/2, bodyTop, CANDLE_WIDTH, bodyH);
        
        // 标注最高/最低价（直接显示，不引线）
        ctx.fillStyle = COLOR_TEXT;
        ctx.font = `${Math.max(10, 10 * zoomLevel)}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.fillText(day.high.toString(), cx, yHigh - 4);
        ctx.fillText(day.low.toString(), cx, yLow + 12);
        
        // 标注日期（统一使用短格式如 "4.2"）
        const match = day.label && day.label.match(/(\d+)\s*月\s*(\d+)\s*日/);
        const dateLabel = match ? match[1] + '.' + match[2] : day.label;
        ctx.fillText(dateLabel, cx, height - MB + 16);
      });
      
      // 更新统计数据（最后一天）
      const last = DATA[DATA.length - 1];
      document.getElementById('statOpen').textContent = last.open;
      document.getElementById('statClose').textContent = last.close;
      document.getElementById('statHigh').textContent = last.high;
      document.getElementById('statLow').textContent = last.low;
    }
    
    // 加载数据并初始化
    async function loadDataAndDraw() {
      try {
        // 添加时间戳避免缓存
        const response = await fetch('emotion-data.json?t=' + Date.now());
        const data = await response.json();
        DATA = data.days;
        
        const size = resizeCanvas();
        drawKline(size);
        console.log('📊 数据加载成功，共', DATA.length, '天');
      } catch (err) {
        console.error('❌ 数据加载失败:', err);
        // 使用默认数据
        DATA = [
          {"date": "2026-03-30", "label": "3 月 30 日", "open": 52, "close": 56, "high": 56, "low": 36},
          {"date": "2026-03-31", "label": "3 月 31 日", "open": 55, "close": 35, "high": 55, "low": 20}
        ];
        const size = resizeCanvas();
        drawKline(size);
      }
    }
    
    // 更新缩放显示
    function updateZoomDisplay() {
      document.getElementById('zoomSlider').value = zoomLevel;
      document.getElementById('zoomLevel').textContent = Math.round(zoomLevel * 100) + '%';
    }
    
    // 重置缩放和平移
    function resetView() {
      zoomLevel = 1;
      panOffset = 0;
      updateZoomDisplay();
      const size = resizeCanvas();
      drawKline(size);
    }
    
    // 缩放控制
    document.getElementById('zoomIn').addEventListener('click', () => {
      zoomLevel = Math.min(MAX_ZOOM, zoomLevel + 0.1);
      updateZoomDisplay();
      const size = resizeCanvas();
      drawKline(size);
    });
    
    document.getElementById('zoomOut').addEventListener('click', () => {
      zoomLevel = Math.max(MIN_ZOOM, zoomLevel - 0.1);
      updateZoomDisplay();
      const size = resizeCanvas();
      drawKline(size);
    });
    
    document.getElementById('zoomSlider').addEventListener('input', (e) => {
      zoomLevel = parseFloat(e.target.value);
      updateZoomDisplay();
      const size = resizeCanvas();
      drawKline(size);
    });
    
    // 鼠标滚轮缩放
    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? -0.1 : 0.1;
      zoomLevel = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, zoomLevel + delta));
      updateZoomDisplay();
      const size = resizeCanvas();
      drawKline(size);
    }, { passive: false });
    
    // 拖拽平移
    canvas.addEventListener('mousedown', (e) => {
      isDragging = true;
      dragStartX = e.clientX;
      panStartOffset = panOffset;
      canvas.style.cursor = 'grabbing';
    });
    
    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const dx = e.clientX - dragStartX;
      panOffset = panStartOffset + dx;
      const size = resizeCanvas();
      drawKline(size);
    });
    
    window.addEventListener('mouseup', () => {
      isDragging = false;
      canvas.style.cursor = 'grab';
    });
    
    // 双击重置
    canvas.addEventListener('dblclick', resetView);
    
    // 启动
    loadDataAndDraw();
    window.addEventListener('resize', () => {
      const size = resizeCanvas();
      drawKline(size);
    });
    
    // 每 2 分钟自动刷新数据（交易时段）
    setInterval(() => {
      const now = new Date();
      const hour = now.getHours();
      const min = now.getMinutes();
      const time = hour * 60 + min;
      
      // 交易时段：9:15-11:30, 13:00-15:05
      const isTradingTime = (time >= 555 && time <= 690) || (time >= 780 && time <= 905);
      
      if (isTradingTime) {
        console.log('🔄 自动刷新数据...');
        loadDataAndDraw();  // 只刷新数据，不刷新整个页面
      }
    }, 120000);  // 2 分钟
  </script>
</body>
</html>
